<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:          #0f1117;
  --card:        #181c27;
  --card-hover:  #1e2334;
  --elevated:    #232840;
  --border:      #2a3048;
  --border-lt:   #353d5a;
  --amber:       #f59e0b;
  --amber-dim:   #92620a;
  --amber-glow:  rgba(245,158,11,0.12);
  --green:       #22c55e;
  --green-dim:   rgba(34,197,94,0.1);
  --red:         #ef4444;
  --red-dim:     rgba(239,68,68,0.1);
  --text:        #e8eaf0;
  --text2:       #8892a4;
  --text3:       #4a5568;
  --mono:        'IBM Plex Mono', monospace;
  --sans:        'IBM Plex Sans', sans-serif;
  --r:           6px;
  --r-lg:        12px;
}

html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; }

#app { max-width: 720px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; padding-bottom: 80px; }

/* HEADER */
.header { background: var(--card); border-bottom: 2px solid var(--amber); padding: 14px 14px 0; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.brand { display: flex; align-items: center; gap: 10px; }
.brand-icon { font-size: 20px; width: 36px; height: 36px; background: var(--amber-glow); border: 1px solid var(--amber-dim); border-radius: var(--r); display: flex; align-items: center; justify-content: center; }
.brand-title { font-family: var(--mono); font-weight: 600; font-size: 13px; letter-spacing: .12em; color: var(--amber); }
.brand-sub { font-size: 11px; color: var(--text3); }
.stats { display: flex; gap: 5px; }
.stat { display: flex; flex-direction: column; align-items: center; padding: 3px 9px; border-radius: var(--r); background: var(--elevated); border: 1px solid var(--border); min-width: 40px; }
.stat.ok  { border-color: rgba(34,197,94,.3); background: var(--green-dim); }
.stat.bad { border-color: rgba(239,68,68,.3); background: var(--red-dim); }
.stat-n { font-family: var(--mono); font-size: 15px; font-weight: 600; line-height: 1; }
.stat.ok  .stat-n { color: var(--green); }
.stat.bad .stat-n { color: var(--red); }
.stat-l { font-size: 9px; font-family: var(--mono); letter-spacing: .08em; color: var(--text3); text-transform: uppercase; }
.prog-wrap { position: relative; height: 4px; background: var(--border); margin: 0 -14px; }
.prog-bar { height: 100%; background: linear-gradient(90deg, var(--amber), #fcd34d); transition: width .4s; width: 0%; box-shadow: 0 0 8px rgba(245,158,11,.5); }
.prog-pct { position: absolute; right: 4px; top: -18px; font-family: var(--mono); font-size: 10px; color: var(--amber); }

/* SYNC STATUS */
.sync-bar { background: var(--card); padding: 4px 14px; font-family: var(--mono); font-size: 10px; color: var(--text3); display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--border); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
.sync-dot.online { background: var(--green); }
.sync-dot.syncing { background: var(--amber); animation: pulse .8s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* TABS */
.tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); padding: 0 8px; position: sticky; top: 74px; z-index: 99; }
.tab { flex: 1; padding: 11px 8px 9px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: .15s; }
.tab:hover { color: var(--text); }
.tab.active { color: var(--amber); border-bottom-color: var(--amber); }
.badge { background: var(--red); color: #fff; font-family: var(--mono); font-size: 10px; font-weight: 600; border-radius: 10px; padding: 1px 6px; display: none; }

/* PANELS */
.panel { display: none; }
.panel.active { display: block; }

/* TOOLBAR */
.toolbar { padding: 10px 12px 6px; display: flex; flex-direction: column; gap: 7px; background: var(--bg); position: sticky; top: 116px; z-index: 98; border-bottom: 1px solid var(--border); }
.search-wrap { position: relative; }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 15px; pointer-events: none; }
.search-input { width: 100%; padding: 8px 32px 8px 30px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color .15s; }
.search-input::placeholder { color: var(--text3); }
.search-input:focus { border-color: var(--amber); }
.search-clear { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text3); cursor: pointer; font-size: 12px; padding: 4px; display: none; }
.row2 { display: flex; gap: 7px; }
.filter-select { flex: 1; padding: 7px 10px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; cursor: pointer; }
.filter-select option { background: var(--card); }
.filter-select:focus { border-color: var(--amber); }
.view-toggle { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; }
.vbtn { padding: 6px 12px; background: none; border: none; color: var(--text2); font-family: var(--mono); font-size: 11px; cursor: pointer; transition: .15s; }
.vbtn.active { background: var(--amber-glow); color: var(--amber); }
.count-bar { padding: 5px 14px; }
.count-bar span { font-family: var(--mono); font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: .08em; }

/* ITEM LIST */
.item-list { padding: 6px 10px; display: flex; flex-direction: column; gap: 4px; }

/* CATEGORY HEADER */
.cat-hdr { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; color: var(--amber); padding: 12px 10px 3px; display: flex; align-items: center; gap: 8px; }
.cat-hdr::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.cat-count { font-size: 9px; color: var(--text3); font-weight: 400; }

/* ITEM CARD */
.item-card { display: flex; align-items: center; gap: 9px; padding: 9px 9px 9px 8px; background: var(--card); border: 1px solid var(--border); border-radius: var(--r); transition: border-color .15s, background .15s; animation: slide-in .15s ease; }
@keyframes slide-in { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
.item-card:hover { background: var(--card-hover); border-color: var(--border-lt); }
.item-card.checked { background: var(--green-dim); border-color: rgba(34,197,94,.25); }
.item-card.bought  { opacity: .55; border-left: 3px solid var(--green); }

/* CHECK CIRCLE */
.chk { width: 25px; height: 25px; min-width: 25px; border-radius: 50%; border: 2px solid var(--border-lt); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; color: transparent; transition: .15s; }
.chk:hover { border-color: var(--green); background: var(--green-dim); }
.checked .chk { border-color: var(--green); background: var(--green); color: #fff; }

/* ITEM BODY */
.item-body { flex: 1; min-width: 0; cursor: pointer; }
.item-name { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.checked .item-name { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--green); }
.bought  .item-name { color: var(--text2); text-decoration: line-through; text-decoration-color: var(--green); }
.item-meta { font-size: 11px; color: var(--text3); font-family: var(--mono); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.cat-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 9px; letter-spacing: .06em; text-transform: uppercase; background: var(--elevated); color: var(--text3); border: 1px solid var(--border); margin-top: 3px; }

/* ACTION BUTTONS */
.actions { display: flex; gap: 3px; }
.abtn { width: 29px; height: 29px; border: 1px solid var(--border); border-radius: var(--r); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text2); transition: .15s; }
.abtn:hover { background: var(--elevated); }
.abtn.cart:hover, .abtn.cart.in  { border-color: var(--amber-dim); background: var(--amber-glow); color: var(--amber); }
.abtn.del:hover { border-color: rgba(239,68,68,.4); background: var(--red-dim); color: var(--red); }

/* CART HEADER */
.cart-hdr { padding: 14px 14px 6px; }
.cart-hdr-row { display: flex; justify-content: space-between; align-items: center; }
.cart-title { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.cart-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
.btn-clear { padding: 5px 10px; background: var(--red-dim); border: 1px solid rgba(239,68,68,.3); border-radius: var(--r); color: var(--red); font-size: 11px; font-family: var(--mono); cursor: pointer; display: none; }
.btn-clear:hover { background: rgba(239,68,68,.2); }

/* CART ITEM */
.cart-list .item-card { border-left: 3px solid var(--amber); }
.cart-list .item-card.bought { border-left-color: var(--green); }

/* EMPTY */
.empty { text-align: center; padding: 50px 20px; display: none; }
.empty.show { display: block; }
.empty-icon { font-size: 36px; margin-bottom: 10px; opacity: .35; }
.empty-t { font-family: var(--mono); font-size: 15px; color: var(--text2); margin-bottom: 5px; }
.empty-s { font-size: 12px; color: var(--text3); max-width: 240px; margin: 0 auto; }

/* NO RESULTS */
.no-res { text-align: center; padding: 36px 20px; color: var(--text3); font-family: var(--mono); font-size: 13px; }

/* MODAL */
.modal-ov { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); }
.modal-ov.open { display: flex; animation: bg-in .2s; }
@keyframes bg-in { from{opacity:0} to{opacity:1} }
.modal-box { background: var(--card); border: 1px solid var(--border-lt); border-bottom: none; border-radius: var(--r-lg) var(--r-lg) 0 0; width: 100%; max-width: 720px; max-height: 88vh; overflow-y: auto; padding: 22px 18px 44px; position: relative; animation: slide-up .25s ease; }
@keyframes slide-up { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-close { position: absolute; top: 14px; right: 14px; width: 28px; height: 28px; background: var(--elevated); border: 1px solid var(--border); border-radius: 50%; color: var(--text2); cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--border); color: var(--text); }
.modal-cat { font-family: var(--mono); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--amber); margin-bottom: 5px; }
.modal-title { font-size: 17px; font-weight: 600; color: var(--text); margin-bottom: 14px; padding-right: 28px; line-height: 1.3; }
.modal-grid { border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 14px; }
.modal-row { display: grid; grid-template-columns: 90px 1fr; border-bottom: 1px solid var(--border); }
.modal-row:last-child { border-bottom: none; }
.modal-lbl { font-family: var(--mono); font-size: 11px; color: var(--text3); padding: 7px 9px; background: var(--elevated); display: flex; align-items: center; }
.modal-val { font-size: 13px; color: var(--text); padding: 7px 9px; }
.modal-sec { margin-top: 14px; }
.modal-sec-t { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--text3); margin-bottom: 7px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
.modal-specs { list-style: none; display: grid; gap: 3px; }
.modal-specs li { font-family: var(--mono); font-size: 12px; color: var(--text2); padding: 5px 8px; background: var(--elevated); border-radius: 4px; display: flex; align-items: center; gap: 7px; }
.modal-specs li::before { content: '›'; color: var(--amber); font-weight: 600; }
.modal-obs { font-size: 13px; color: var(--text2); line-height: 1.6; padding: 9px; background: var(--elevated); border-radius: var(--r); border-left: 3px solid var(--amber-dim); }

/* TOAST */
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(70px); background: var(--elevated); border: 1px solid var(--border-lt); border-radius: var(--r); padding: 9px 16px; font-family: var(--mono); font-size: 12px; color: var(--text); z-index: 300; transition: transform .22s, opacity .22s; opacity: 0; white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,.4); }
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
.toast.green { border-color: rgba(34,197,94,.5); color: var(--green); }
.toast.amber { border-color: var(--amber-dim); color: var(--amber); }
.toast.red   { border-color: rgba(239,68,68,.4); color: var(--red); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-lt); border-radius: 2px; }

@media (min-width: 560px) {
  .toolbar { flex-direction: row; flex-wrap: wrap; }
  .search-wrap { flex: 1; min-width: 180px; }
  .row2 { flex: 1; }
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <div class="brand-icon">⚡</div>
        <div>
          <div class="brand-title">CHECKLIST OBRA</div>
          <div class="brand-sub">Conferência de Materiais</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><span class="stat-n" id="cnt-total">0</span><span class="stat-l">total</span></div>
        <div class="stat ok"><span class="stat-n" id="cnt-ok">0</span><span class="stat-l">ok</span></div>
        <div class="stat bad"><span class="stat-n" id="cnt-bad">0</span><span class="stat-l">faltam</span></div>
      </div>
    </div>
    <div class="prog-wrap">
      <div class="prog-bar" id="prog-bar"></div>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
  </header>

  <!-- SYNC STATUS -->
  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-txt">Conectando...</span>
  </div>

  <!-- TABS -->
  <nav class="tabs">
    <button class="tab active" id="tab-cl" onclick="switchTab('cl')">☑ Checklist</button>
    <button class="tab" id="tab-cart" onclick="switchTab('cart')">🛒 Lista de Compras <span class="badge" id="cart-badge">0</span></button>
  </nav>

  <!-- CHECKLIST PANEL -->
  <div id="panel-cl" class="panel active">
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" id="search" class="search-input" placeholder="Buscar materiais..." oninput="onSearch()">
        <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
      </div>
      <div class="row2">
        <select id="cat-filter" class="filter-select" onchange="onFilter()">
          <option value="">Todas as categorias</option>
        </select>
        <div class="view-toggle">
          <button class="vbtn active" id="v-all" onclick="setView('all')">Todos</button>
          <button class="vbtn" id="v-pend" onclick="setView('pending')">Pendentes</button>
        </div>
      </div>
    </div>
    <div class="count-bar"><span id="vis-count">0 itens</span></div>
    <div id="cl-list" class="item-list"></div>
  </div>

  <!-- CART PANEL -->
  <div id="panel-cart" class="panel">
    <div class="cart-hdr">
      <div class="cart-hdr-row">
        <h2 class="cart-title">Lista de Compras</h2>
        <button class="btn-clear" id="btn-clear" onclick="clearCart()">Limpar tudo</button>
      </div>
      <p class="cart-sub" id="cart-sub">Itens adicionados durante a conferência</p>
    </div>
    <div id="cart-list" class="item-list cart-list"></div>
    <div class="empty show" id="cart-empty">
      <div class="empty-icon">🛒</div>
      <p class="empty-t">Lista vazia</p>
      <p class="empty-s">Adicione itens faltantes pelo ícone de carrinho no Checklist</p>
    </div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-ov" id="modal" onclick="closeModal(event)">
  <div class="modal-box" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-cat" id="m-cat"></div>
    <h2 class="modal-title" id="m-title"></h2>
    <div class="modal-grid" id="m-grid"></div>
    <div class="modal-sec" id="m-specs-sec" style="display:none">
      <div class="modal-sec-t">Especificações Técnicas</div>
      <ul class="modal-specs" id="m-specs"></ul>
    </div>
    <div class="modal-sec" id="m-obs-sec" style="display:none">
      <div class="modal-sec-t">Observações</div>
      <p class="modal-obs" id="m-obs"></p>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-txt');
  if (status === 'online')  { dot.className = 'sync-dot online';  txt.textContent = 'Sincronizado'; }
  if (status === 'syncing') { dot.className = 'sync-dot syncing'; txt.textContent = 'Salvando...'; }
  if (status === 'offline') { dot.className = 'sync-dot';         txt.textContent = 'Offline — dados salvos localmente'; }
}

function saveState() {
  // Always save to localStorage as backup
  try { localStorage.setItem('checklist_obra_v1', JSON.stringify(state)); } catch(e) {}

  // Save to Firebase if available
  if (window.firebaseReady && window.firebaseDB) {
    setSyncStatus('syncing');
    try {
      window.firebaseSet(window.firebaseRef(window.firebaseDB, DB_PATH), state)
        .then(() => setSyncStatus('online'))
        .catch(() => setSyncStatus('offline'));
    } catch(e) { setSyncStatus('offline'); }
  }
}

function loadState() {
  // Load from localStorage first (instant)
  try {
    const s = localStorage.getItem('checklist_obra_v1');
    if (s) { state = { checked:{}, deleted:{}, cart:{}, bought:{}, ...JSON.parse(s) }; }
  } catch(e) {}

  // Then try Firebase (live sync)
  if (window.firebaseReady && window.firebaseDB) {
    setSyncStatus('syncing');
    window.firebaseOnValue(window.firebaseRef(window.firebaseDB, DB_PATH), (snapshot) => {
      const data = snapshot.val();
      if (data) {
        state = { checked:{}, deleted:{}, cart:{}, bought:{}, ...data };
        try { localStorage.setItem('checklist_obra_v1', JSON.stringify(state)); } catch(e) {}
      }
      setSyncStatus('online');
      render();
      updateStats();
    }, () => setSyncStatus('offline'));
  } else {
    setSyncStatus('offline');
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  buildCatFilter();
  loadState();
  render();
  updateStats();
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js').catch(() => {});
  }
}

window.addEventListener('firebaseLoaded', init);
// Fallback if Firebase doesn't load in 3s
setTimeout(() => {
  if (!document.getElementById('cl-list').innerHTML) init();
}, 3000);

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() { renderChecklist(); renderCart(); updateBadge(); }

function getFiltered() {
  return CATALOG.filter(item => {
    if (state.deleted[item.id]) return false;
    if (catFilter && item.categoria !== catFilter) return false;
    if (query) {
      const q = query.toLowerCase();
      if (![item.item, item.modelo, item.marca, item.categoria].some(f => (f||'').toLowerCase().includes(q))) return false;
    }
    if (view === 'pending' && state.checked[item.id]) return false;
    return true;
  });
}

function renderChecklist() {
  const list = document.getElementById('cl-list');
  const filtered = getFiltered();
  document.getElementById('vis-count').textContent = `${filtered.length} ${filtered.length === 1 ? 'item' : 'itens'}`;

  if (!filtered.length) { list.innerHTML = '<div class="no-res">Nenhum item encontrado</div>'; return; }

  const grouped = {};
  filtered.forEach(i => { if (!grouped[i.categoria]) grouped[i.categoria] = []; grouped[i.categoria].push(i); });

  list.innerHTML = Object.entries(grouped).map(([cat, items]) => `
    <div class="cat-hdr">${esc(cat)}<span class="cat-count">${items.length}</span></div>
    ${items.map(buildCard).join('')}
  `).join('');
}

function buildCard(item) {
  const checked = !!state.checked[item.id];
  const inCart  = !!state.cart[item.id];
  return `
    <div class="item-card${checked ? ' checked' : ''}" id="card-${item.id}">
      <button class="chk" onclick="toggleCheck('${item.id}')">${checked ? '✓' : ''}</button>
      <div class="item-body" onclick="openDetail('${item.id}')">
        <div class="item-name">${esc(item.item)}</div>
        <div class="item-meta">${esc(item.marca||'')}${item.modelo ? ' · '+esc(item.modelo) : ''}</div>
      </div>
      <div class="actions">
        <button class="abtn cart${inCart?' in':''}" onclick="toggleCart('${item.id}')" title="${inCart?'Remover do carrinho':'Adicionar à lista'}">🛒</button>
        <button class="abtn del" onclick="deleteItem('${item.id}')" title="Remover da lista">🗑</button>
      </div>
    </div>`;
}

function renderCart() {
  const list  = document.getElementById('cart-list');
  const empty = document.getElementById('cart-empty');
  const clearBtn = document.getElementById('btn-clear');
  const cartItems = CATALOG.filter(i => state.cart[i.id]);

  if (!cartItems.length) {
    list.innerHTML = '';
    empty.classList.add('show');
    clearBtn.style.display = 'none';
    document.getElementById('cart-sub').textContent = 'Itens adicionados durante a conferência';
    return;
  }

  empty.classList.remove('show');
  clearBtn.style.display = 'block';
  const bought = cartItems.filter(i => state.bought[i.id]).length;
  document.getElementById('cart-sub').textContent = `${cartItems.length} ${cartItems.length===1?'item':'itens'} · ${bought} comprado${bought!==1?'s':''}`;

  list.innerHTML = cartItems.map(item => {
    const isBought = !!state.bought[item.id];
    return `
      <div class="item-card${isBought?' bought':''}" id="cart-card-${item.id}">
        <input type="checkbox" class="chk" style="width:20px;height:20px;min-width:20px;accent-color:#22c55e;cursor:pointer;border:none;"
          ${isBought?'checked':''} onchange="toggleBought('${item.id}')">
        <div class="item-body" onclick="openDetail('${item.id}')">
          <div class="item-name">${esc(item.item)}</div>
          <div class="item-meta">${esc(item.marca||'')}</div>
          <span class="cat-tag">${esc(item.categoria)}</span>
        </div>
        <div class="actions">
          <button class="abtn del" onclick="removeCart('${item.id}')">✕</button>
        </div>
      </div>`;
  }).join('');
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function toggleCheck(id) {
  state.checked[id] = !state.checked[id];
  if (!state.checked[id]) delete state.checked[id];
  saveState(); render(); updateStats();
  toast(state.checked[id] ? '✓ Material conferido' : 'Marcação removida', state.checked[id] ? 'green' : '');
}

function toggleCart(id) {
  const was = !!state.cart[id];
  state.cart[id] = !state.cart[id];
  if (!state.cart[id]) { delete state.cart[id]; delete state.bought[id]; }
  saveState(); render();
  toast(was ? 'Removido do carrinho' : '🛒 Adicionado à lista de compras', 'amber');
}

function deleteItem(id) {
  state.deleted[id] = true;
  delete state.checked[id]; delete state.cart[id]; delete state.bought[id];
  saveState(); render(); updateStats();
  toast('Item removido da lista', 'red');
}

function removeCart(id) {
  delete state.cart[id]; delete state.bought[id];
  saveState(); render(); updateBadge();
  toast('Removido da lista de compras', 'red');
}

function toggleBought(id) {
  state.bought[id] = !state.bought[id];
  if (!state.bought[id]) delete state.bought[id];
  saveState(); renderCart();
}

function clearCart() {
  if (!confirm('Limpar toda a lista de compras?')) return;
  Object.keys(state.cart).forEach(id => { delete state.cart[id]; delete state.bought[id]; });
  saveState(); render(); toast('Lista de compras limpa', 'red');
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const active  = CATALOG.filter(i => !state.deleted[i.id]);
  const total   = active.length;
  const checked = active.filter(i => state.checked[i.id]).length;
  const pct     = total > 0 ? Math.round(checked/total*100) : 0;
  document.getElementById('cnt-total').textContent = total;
  document.getElementById('cnt-ok').textContent    = checked;
  document.getElementById('cnt-bad').textContent   = total - checked;
  document.getElementById('prog-bar').style.width  = pct + '%';
  document.getElementById('prog-pct').textContent  = pct + '%';
}

function updateBadge() {
  const n = Object.keys(state.cart).length;
  const b = document.getElementById('cart-badge');
  b.textContent = n; b.style.display = n > 0 ? 'inline-block' : 'none';
}

// ── SEARCH / FILTER ───────────────────────────────────────────────────────────
function onSearch() {
  query = document.getElementById('search').value.trim();
  document.getElementById('search-clear').style.display = query ? 'block' : 'none';
  renderChecklist();
}
function clearSearch() {
  document.getElementById('search').value = ''; query = '';
  document.getElementById('search-clear').style.display = 'none';
  renderChecklist();
}
function onFilter() { catFilter = document.getElementById('cat-filter').value; renderChecklist(); }
function setView(v) {
  view = v;
  document.getElementById('v-all').classList.toggle('active', v==='all');
  document.getElementById('v-pend').classList.toggle('active', v==='pending');
  renderChecklist();
}
function buildCatFilter() {
  const cats = [...new Set(CATALOG.map(i => i.categoria))].sort();
  const sel = document.getElementById('cat-filter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(t) {
  document.getElementById('panel-cl').classList.toggle('active', t==='cl');
  document.getElementById('panel-cart').classList.toggle('active', t==='cart');
  document.getElementById('tab-cl').classList.toggle('active', t==='cl');
  document.getElementById('tab-cart').classList.toggle('active', t==='cart');
}

// ── MODAL ─────────────────────────────────────────────────────────────────────
function openDetail(id) {
  const item = CATALOG.find(i => i.id === id);
  if (!item) return;
  document.getElementById('m-cat').textContent   = item.categoria;
  document.getElementById('m-title').textContent = item.item;

  const fields = [['Modelo',item.modelo],['Marca',item.marca],['Cor',item.cor],['Tamanho',item.tamanho],['Material',item.material]];
  document.getElementById('m-grid').innerHTML = fields
    .filter(([,v]) => v && v !== '-')
    .map(([l,v]) => `<div class="modal-row"><span class="modal-lbl">${l}</span><span class="modal-val">${esc(v)}</span></div>`)
    .join('');

  const specsEl = document.getElementById('m-specs-sec');
  if (item.especificacoes && item.especificacoes.length) {
    document.getElementById('m-specs').innerHTML = item.especificacoes.map(s => `<li>${esc(s)}</li>`).join('');
    specsEl.style.display = 'block';
  } else specsEl.style.display = 'none';

  const obsEl = document.getElementById('m-obs-sec');
  if (item.observacoes && item.observacoes !== '-') {
    document.getElementById('m-obs').textContent = item.observacoes;
    obsEl.style.display = 'block';
  } else obsEl.style.display = 'none';

  document.getElementById('modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal')) return;
  document.getElementById('modal').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' '+type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
