<head>

</head>
<body>
  <div id="app">

```
<!-- HEADER -->
<header class="header">
  <div class="header-top">
    <div class="header-brand">
      <div class="brand-icon">⚡</div>
      <div>
        <div class="brand-title">CHECKLIST OBRA</div>
        <div class="brand-sub">Conferência de Materiais</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="stat-pill" id="stat-total">
        <span class="stat-num" id="count-total">0</span>
        <span class="stat-label">total</span>
      </div>
      <div class="stat-pill stat-ok" id="stat-checked">
        <span class="stat-num" id="count-checked">0</span>
        <span class="stat-label">ok</span>
      </div>
      <div class="stat-pill stat-missing" id="stat-missing">
        <span class="stat-num" id="count-missing">0</span>
        <span class="stat-label">faltam</span>
      </div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar"></div>
    <span class="progress-text" id="progress-text">0%</span>
  </div>
</header>

<!-- TABS -->
<nav class="tabs">
  <button class="tab active" id="tab-checklist" onclick="switchTab('checklist')">
    <span class="tab-icon">☑</span> Checklist
  </button>
  <button class="tab" id="tab-cart" onclick="switchTab('cart')">
    <span class="tab-icon">🛒</span> Lista de Compras
    <span class="cart-badge" id="cart-badge" style="display:none">0</span>
  </button>
</nav>

<!-- CHECKLIST PANEL -->
<div id="panel-checklist" class="panel active">
  <!-- SEARCH & FILTER -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar materiais..." oninput="handleSearch()" />
      <button class="search-clear" id="search-clear" onclick="clearSearch()" style="display:none">✕</button>
    </div>
    <div class="filter-wrap">
      <select id="category-filter" class="filter-select" onchange="handleFilter()">
        <option value="">Todas as categorias</option>
      </select>
    </div>
    <div class="view-toggle">
      <button class="toggle-btn active" id="view-all-btn" onclick="setView('all')">Todos</button>
      <button class="toggle-btn" id="view-pending-btn" onclick="setView('pending')">Pendentes</button>
    </div>
  </div>

  <div id="item-count-bar" class="item-count-bar">
    <span id="visible-count">0 itens</span>
  </div>

  <!-- ITEM LIST -->
  <div id="checklist-list" class="item-list"></div>
</div>

<!-- CART PANEL -->
<div id="panel-cart" class="panel">
  <div class="cart-header">
    <div class="cart-title-row">
      <h2 class="cart-title">Lista de Compras</h2>
      <button class="btn-clear-cart" onclick="clearCart()" id="clear-cart-btn" style="display:none">Limpar tudo</button>
    </div>
    <p class="cart-subtitle" id="cart-subtitle">Itens adicionados durante a conferência</p>
  </div>
  <div id="cart-list" class="item-list cart-list"></div>
  <div id="cart-empty" class="empty-state">
    <div class="empty-icon">🛒</div>
    <p class="empty-title">Lista vazia</p>
    <p class="empty-sub">Adicione itens faltantes pelo ícone de carrinho no Checklist</p>
  </div>
</div>
```

  </div>

  <!-- ITEM DETAIL MODAL -->

  <div id="detail-modal" class="modal-overlay" onclick="closeModal(event)">
    <div class="modal-box" id="modal-box">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-tag" id="modal-categoria"></div>
      <h2 class="modal-title" id="modal-item"></h2>
      <div class="modal-grid">
        <div class="modal-row" id="modal-modelo-row">
          <span class="modal-label">Modelo</span>
          <span class="modal-value" id="modal-modelo"></span>
        </div>
        <div class="modal-row" id="modal-marca-row">
          <span class="modal-label">Marca</span>
          <span class="modal-value" id="modal-marca"></span>
        </div>
        <div class="modal-row" id="modal-cor-row">
          <span class="modal-label">Cor</span>
          <span class="modal-value" id="modal-cor"></span>
        </div>
        <div class="modal-row" id="modal-tamanho-row">
          <span class="modal-label">Tamanho</span>
          <span class="modal-value" id="modal-tamanho"></span>
        </div>
        <div class="modal-row" id="modal-material-row">
          <span class="modal-label">Material</span>
          <span class="modal-value" id="modal-material"></span>
        </div>
      </div>
      <div class="modal-section" id="modal-specs-section">
        <div class="modal-section-title">Especificações Técnicas</div>
        <ul class="modal-specs" id="modal-specs"></ul>
      </div>
      <div class="modal-section" id="modal-obs-section">
        <div class="modal-section-title">Observações</div>
        <p class="modal-obs" id="modal-obs"></p>
      </div>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->

  <div id="toast" class="toast"></div>

  <script src="app.js"></script>

</body>
</html>
